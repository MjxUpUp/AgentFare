name: Release

# tag-based 统一发布：打 v*.*.* tag 触发，build 后递归 publish 全部包。
# 内部 @agentfare/* 依赖用 workspace:*，pnpm publish 时自动替换为真实版本。
# 版本由 scripts/bump-version.mjs 统一管理（VERSION=x.y.z pnpm version:bump）。

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish all packages
        # -r 递归发布；--no-git-checks 跳过 git clean 检查（CI checkout 视为干净）
        run: pnpm publish -r --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
